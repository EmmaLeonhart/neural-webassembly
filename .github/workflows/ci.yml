# Runs the replication end-to-end on every push: provisions the toolchain,
# builds the analytic transformer weights + C++ engine, and runs all example
# programs through it, asserting every program reproduces its reference WASM
# trace (scripts/run.py exits non-zero on any FAIL).
#
# This is heavy (it installs torch and downloads CUDA wheels via uv), so it runs
# only on pushes/PRs to main and can be dispatched manually.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  replicate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain (clang+wasm32, lld, g++, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld cmake python3-dev
          clang --print-targets | grep -i wasm32

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync transformer-vm dependencies
        working-directory: replication_target/transformer-vm
        run: uv sync

      - name: Run replication (build weights + C++ engine, run all programs)
        run: python3 scripts/run.py

      - name: Install Rust + OCaml (for the isomorphs)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          sudo apt-get install -y ocaml ocaml-dune

      - name: Isomorph equivalence (Python ≡ Rust ≡ OCaml)
        # The replication step above compiled the example programs into the
        # submodule's data/; here we confirm the Rust + OCaml isomorphs of
        # wasm/reference.py produce byte-identical output on all of them.
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/iso_equiv.sh

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: results/metrics.json
          if-no-files-found: ignore
